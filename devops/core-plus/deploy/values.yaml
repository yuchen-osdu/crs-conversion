# Default values for crs-conversion-deploy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  domain: ""
  onPremEnabled: false
  limitsEnabled: true

data:
  #configmaps
  logLevel: "ERROR"
  sisData: "/crs-converter/apachesis_setup/SIS_DATA"
  storageHost: "http://storage"
  entitlementsHost: "http://entitlements"
  #deployments
  requestsCpu: "5m"
  requestsMemory: "230Mi"
  limitsCpu: "1"
  limitsMemory: "1G"
  serviceAccountName: "crs-converter"
  imagePullPolicy: "IfNotPresent"
  image: ""

conf:
  configmap: "crs-conversion-config"
  appName: "crs-conversion"
  replicas: 1

istio:
  proxyCPU: "5m"
  proxyCPULimit: "500m"
  proxyMemory: "50Mi"
  proxyMemoryLimit: "512Mi"
  auth:
    basePath: /api/crs/converter
    versions:
      - v2
      - v3
      - v4
    disable:
      # context-root paths (leading / emitted as-is)
      - "/api/crs/converter/index.html"
      - "/api/crs/converter/api-docs"
      - "/api/crs/converter/api-docs/*"
      - "/api/crs/converter/api-docs.yaml"
      - "/api/crs/converter/swagger"
      - "/api/crs/converter/swagger-ui.html"
      - "/api/crs/converter/swagger-ui/*"
      - "/api/crs/converter/swagger-resources"
      - "/api/crs/converter/swagger-config"
      - "/api/crs/converter/_ah/liveness_check"
      - "/api/crs/converter/_ah/readiness_check"
      # versioned paths (expanded to /api/crs/converter/<version>/<path>)
      - "_ah/liveness_check"
      - "_ah/readiness_check"

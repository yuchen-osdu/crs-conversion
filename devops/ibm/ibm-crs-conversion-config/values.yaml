  logPrefix: schema
  loggingLevelOsdu: debug
  loggingLevelSpring: debug

# ibm 
  beanDefOverriding: true
  healthCheckUri: "/api/crs/converter/v2/info"
 
conf:
  configmap: "crs-conversion-config"

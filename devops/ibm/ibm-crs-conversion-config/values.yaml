data:
# common
  javaAppJar: "/deployments/*-spring-boot.jar"
  serverPort: 8080
  contextPath: "/api/crs/converter"
  pKCEndPointHost: referenv
  keycloakRealm: OSDU
  pKCClientId: partition-service

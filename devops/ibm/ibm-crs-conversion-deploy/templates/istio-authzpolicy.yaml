apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.conf.appName }}-authz-policy
spec:
  selector:
    matchLabels:
      {{- include "ibm-crs-conversion-deploy.selectorLabels" . | nindent 6 }}
  action: DENY
  rules:
  - from:
    - source:
        notRequestPrincipals:
        - '*'
    to:
    - operation:
        notPaths:
        - '*/v2/api-docs'
        - /api/crs/converter/v2/info
        - /api/crs/converter/v3/info
        - /api/crs/converter/_ah/liveness_check
        - /api/crs/converter/_ah/readiness_check
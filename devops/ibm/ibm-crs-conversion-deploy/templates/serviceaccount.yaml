{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ibm-crs-conversion-deploy.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibm-crs-conversion-deploy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-40"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ibm-crs-conversion-deploy.serviceAccountName" . }}
  labels:
    {{- include "ibm-crs-conversion-deploy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-40"
rules:
  - apiGroups:
      - "config.openshift.io"
      - "security.istio.io"
      - "networking.istio.io"
      - ""
    resources:
      - "secrets"
      - "pods/exec"
      - "pods"
      - "configmaps"
      - "services"
      - "requestauthentications"
      - "envoyfilters"
    verbs:
      - "list"
      - "get"
      - "patch"
      - "create"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ibm-crs-conversion-deploy.serviceAccountName" . }}
  labels:
    {{- include "ibm-crs-conversion-deploy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-40"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ibm-crs-conversion-deploy.serviceAccountName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "ibm-crs-conversion-deploy.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

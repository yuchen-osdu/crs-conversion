apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: osdu
  name: osdu-gitlab-crs-conversion-service-crs-converter
  labels:
    app: crs-converter
    appversion: 0.1.0
    aadpodidbinding: osdu-identity
spec:
  replicas: 1
  selector:
    matchLabels:
      aadpodidbinding: osdu-identity
      app: crs-converter
      appversion: 0.1.0
  template:
    metadata:
      labels:
        aadpodidbinding: osdu-identity
        app: crs-converter
        appversion: 0.1.0
    spec:
      volumes:
        - name: azure-keyvault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-keyvault
      containers:
        - name: crs-converter
          image: "community.opengroup.org:5555/osdu/platform/system/reference/crs-conversion-service/crs-converter-master:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/crs/converter/swagger-ui.html
              port: 8080
            initialDelaySeconds: 45
            timeoutSeconds: 15
            periodSeconds: 2
            successThreshold: 1
            failureThreshold: 5
          volumeMounts:
            - name: azure-keyvault
              mountPath: "/mnt/azure-keyvault"
              readOnly: true
          env:
            - name: spring_application_name
              value: crs-conversion-service
            - name: server.servlet.contextPath
              value: /api/crs/converter/
            - name: server_port
              value: "8080"
            - name: ACCEPT_HTTP  # TEMPORARY UNTIL HTTPS
              value: "true"
            - name: KEYVAULT_URI
              valueFrom:
                configMapKeyRef:
                  name: osdu-svc-properties
                  key: ENV_KEYVAULT
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: active-directory
                  key: tenantid
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: active-directory
                  key: principal-clientid
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: active-directory
                  key: principal-clientpassword
            - name: appinsights_key
              valueFrom:
                secretKeyRef:
                  name: central-logging
                  key: appinsights
            - name: aad_client_id
              valueFrom:
                secretKeyRef:
                  name: active-directory
                  key: application-appid
            - name: ENTITLEMENT_URL
              value: http://entitlements/api/entitlements/v2
            - name: azure_istioauth_enabled
              value: "true"
            - name: ESRI_DATA_PATH
              value: \crs-conversion-service  
            - name: cosmosdb_database
              value: osdu-db
            - name: service_domain_name
              value: contoso.com
apiVersion: v1
kind: Service
metadata:
  name: crs-conversion-service
  namespace: osdu
  labels:
    resource: "crsService"
    app: crs-converter
    appversion: 0.1.0
    aadpodidbinding: osdu-identity
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: crs-converter
    appversion: 0.1.0
    aadpodidbinding: osdu-identity

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: osdu
  name: {{ include "azure-crs-converter.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
    appversion: {{ .Chart.Version }}
    aadpodidbinding: osdu-identity
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.global.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      aadpodidbinding: osdu-identity
      app: {{ .Chart.Name }}
      appversion: {{ .Chart.Version }}
  template:
    metadata:
      labels:
        aadpodidbinding: osdu-identity
        app: {{ .Chart.Name }}
        appversion: {{ .Chart.Version }}
    spec:
      volumes:
        - name: azure-keyvault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-keyvault
        - name: shared-data
          persistentVolumeClaim:
            claimName: crs-conversion-pvc        
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}/{{ .Chart.Name }}-{{ .Values.image.branch }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.application.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/crs/converter/swagger-ui.html
              port: {{ .Values.application.port }}
            initialDelaySeconds: 45
            timeoutSeconds: 15
            periodSeconds: 2
            successThreshold: 1
            failureThreshold: 5
          volumeMounts:
            - name: azure-keyvault
              mountPath: "/mnt/azure-keyvault"
              readOnly: true
            - name: shared-data
              mountPath: /mnt/crs_conversion  
          env:
            - name: spring_application_name
              value: crs-conversion-service
            - name: server.servlet.contextPath
              value: /api/crs/converter/
            - name: server_port
              value: "8080"
            - name: ACCEPT_HTTP  # TEMPORARY UNTIL HTTPS
              value: "true"
            - name: KEYVAULT_URI
              valueFrom:
                configMapKeyRef:
                  name: osdu-svc-properties
                  key: ENV_KEYVAULT
            - name: appinsights_key
              valueFrom:
                secretKeyRef:
                  name: central-logging
                  key: appinsights
            - name: aad_client_id
              valueFrom:
                secretKeyRef:
                  name: active-directory
                  key: application-appid
            - name: ENTITLEMENT_URL
              value: http://entitlements-azure/entitlements/v1
            - name: azure_istioauth_enabled
              value: "true"
            - name: ESRI_DATA_PATH
              value: /crs-conversion-service  
            - name: cosmosdb_database
              value: osdu-db
            - name: service_domain_name
              value: contoso.com
            - name: SIS_DATA
              value: /mnt/crs_conversion

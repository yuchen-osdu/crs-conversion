server:
  port: 8080

  servlet:
    application-display-name: CRS Converter Service
    contextPath: /api/crs/converter/

  error.whitelabel.enabled: false

spring.mvc.throw-exception-if-no-handler-found: true
spring:
  application:
    name: ${spring_application_name}
# Entitlement properties
#
#
# [Required] URL of the Entitlements Service
osdu.entitlement.url: ${ENTITLEMENT_URL}
# Istio Auth Enabled
azure:
  cryptography:
    enabled: false
  eventgrid:
    topic:
      enabled: false
    manager:
      enabled: false
  keyvault:
    url: ${KEYVAULT_URI}
  activedirectory:
    app-resource-id: ${aad_client_id}
  istio:
    auth:
      enabled: true
  application-insights:
    instrumentation-key: ${appinsights_key}
logging:
  level:
    org:
      springframework:
        web: INFO
  transaction:
    enabled: true
  slf4jlogger:
    enabled: true
  mdccontext:
    enabled: true
  ignore:
    servlet:
      paths: /swagger-ui.html
LOG_PREFIX: converter

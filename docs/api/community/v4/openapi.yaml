    MeasuredDepthInterval:
      type: object
      title: Measured Depth Interpolation Specification
      description: Defines where additional trajectory stations should be interpolated.
        Use either md_i for specific depths or md_interval for regular spacing - not
        both.
      properties:
        md_i:
          type: array
          description: Explicit list of measured depth values where interpolated stations
            should be generated. Values must be within the range of input station
            MDs. Units follow unitMD (or unitZ if unitMD not specified).
          items:
            type: number
            format: double
          example:
            - 50
            - 75
            - 100
            - 150
            - 200
        md_interval:
          type: number
          format: double
          description: 'Regular interval for generating interpolated stations. Stations
            are created from the first input MD to the last at this spacing. Example:
            25.0 generates stations at 0, 25, 50, 75, etc.'
          example: 25.0
          minimum: 0
          exclusiveMinimum: true
    TrajectoryStationInV4:
      title: Input Trajectory Station
      type: object
      description: 'Input survey station data for trajectory computation. Required
        fields depend on the inputKind parameter. For MD_Incl_Azim: md, inclination,
        azimuth. For dX_dY_dZ: dx, dy, dz.'
      properties:
        md:
          type: number
          description: Measured Depth - distance along the wellbore from the reference
            point (e.g., kelly bushing). Required for most inputKind values. Unit
            is specified by unitZ or unitMD.
          format: double
          example: 2563.56
          minimum: 0
        inclination:
          type: number
          description: Wellbore inclination angle in degrees. 0° = vertical (down),
            90° = horizontal, 180° = vertical (up). Required for MD_Incl_Azim and
            MD_Incl inputKind.
          format: double
          example: 15.0
          minimum: 0
          maximum: 180
        azimuth:
          type: number
          description: Wellbore azimuth (direction) angle in degrees. 0°/360° = North,
            90° = East, 180° = South, 270° = West. Reference (True North or Grid North)
            is specified by azimuthReference.
          format: double
          example: 355.0
          minimum: 0
          maximum: 360
        dx:
          type: number
          description: East-West displacement from the well reference point. Positive
            = East. Used for dX_dY_dZ and MD_dX_dY_dZ inputKind. Unit is specified
            by unitXY.
          format: double
          example: 55.9
        dy:
          type: number
          description: North-South displacement from the well reference point. Positive
            = North. Y-axis alignment (True North or Grid North) depends on azimuthReference.
            Unit is specified by unitXY.
          format: double
          example: -145.3
        dz:
          type: number
          description: Vertical displacement (True Vertical Depth) from the well reference
            point. Positive = deeper/downward. Unit is specified by unitZ.
          format: double
          example: 1965.6
      example:
        - md: 0
          inclination: 0
          azimuth: 0
        - md: 1000
          inclination: 0
          azimuth: 0
        - md: 2000
          inclination: 90
          azimuth: 0
        - md: 3000
          inclination: 90
          azimuth: 0
        - md: 5000
          inclination: 90
          azimuth: 90
        - md: 6000
          inclination: 90
          azimuth: 90

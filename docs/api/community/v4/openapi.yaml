openapi: 3.0.0
info:
  description: 'The CRS Conversion Service provides coordinate conversion and transformation
    services between different Coordinate Reference Systems (CRS).


    ## Key Concepts


    - **Conversion**: Operation between CRS that share the same datum (no datum shift
    required)

    - **Transformation**: Operation involving datum transformations when source and
    target CRS have different datums

    - **Persistable Reference**: A JSON string or OSDU record ID that uniquely identifies
    a CRS, unit, or transformation


    ## API Versions


    This is the **v4 API** which adds support for:

    - Explicit transformations to override early binding

    - Enhanced trajectory computation with interpolation

    - Improved GeoJSON/AnyCrsGeoJSON support


    ## Authentication


    All endpoints require a valid Bearer token in the Authorization header and a data-partition-id
    header.'
  version: 4.0.0
  title: CRS Conversion Service - V4 API
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
security:
  - Bearer: []
  - google_id_token: []
tags:
  - name: Info Api
    description: Service information and health check endpoints
  - name: Convert
    description: Coordinate conversion and transformation endpoints. Includes point
      conversion, trajectory computation, and GeoJSON transformation between different
      Coordinate Reference Systems (CRS).
paths:
  /v4/convertTrajectory:
    post:
      tags:
        - Convert
      summary: Convert trajectory stations
      description: 'Convert a list of trajectory stations, given the unit and spatial
        context and a reference point in 3D where MD==0. For survey MD, Incl, Azi
        input, minimum curvature is used to calculate the local deviations and absolute
        coordinates. For MD_dX,dY,dZ, the inverse minimum curvature is first applied
        to compute Inc and Azi, which then are used as input to compute the trajectory.


        **Interpolation Feature**: When `interpolate=true` (default), additional stations
        can be generated at specified measured depths using the `MD_i` parameter:

        - Use `MD_i.md_i` for explicit MD values, e.g., [50, 75, 150]

        - Use `MD_i.md_interval` for regular spacing, e.g., 25 for every 25 units

        - Interpolated stations use minimum curvature interpolation for inc/azi and
        position

        - Response stations include `original: true/false` to distinguish survey vs
        interpolated

        - Set `interpolate=false` to process only original survey stations (MD_i is
        ignored)


        ## Request Body Parameters


        | Parameter | Type | Required | Description |

        |-----------|------|----------|-------------|

        | **trajectoryCRS** | string | Yes | Coordinate reference system for the reference
        point. Typically a projected CRS; if geographic CRS, unitXY must be defined
        and azimuthReference must be TRUE_NORTH. |

        | **referencePoint** | Point | Yes | The well surface location (x, y, z) where
        MD=0. Coordinates are in trajectoryCRS units. |

        | **inputStations** | array | Yes | Array of input trajectory stations. Required
        fields depend on inputKind. |

        | **unitZ** | string | Yes | Unit of measure for vertical values (dz) and
        measured depth. OSDU record ID or persistable reference JSON. |

        | **method** | string | Yes | Computation method: ''AzimuthalEquidistant''
        (default) or ''LMP'' (Lee''s Modified Proposal SPE96813). |

        | **azimuthReference** | string | No | Reference for azimuth angles: TRUE_NORTH
        (TN) or GRID_NORTH (GN). Default: TRUE_NORTH. |

        | **unitXY** | string | No | Unit for horizontal displacements (dx, dy). Required
        for dX_dY_dZ input kinds. Auto-derived from projected CRS if not specified.
        |

        | **unitMD** | string | No | Unit for Measured Depth values. Defaults to unitZ
        if not specified. |

        | **inputKind** | string | No | Input format: MD_Incl_Azim (default), MD_dX_dY_dZ,
        dX_dY_dZ, MD_Incl, MD_X_Y_Z, X_Y_Z. |

        | **interpolate** | boolean | No | When true (default), interpolates stations
        at MD_i depths. When false, only original stations processed. |

        | **MD_i** | object | No | Interpolation specification: md_i (array of specific
        depths) or md_interval (regular spacing). |


        ## Input Station Fields (TrajectoryStationInV4)


        | Field | Description |

        |-------|-------------|

        | **md** | Measured Depth - distance along wellbore from reference point.
        Unit: unitMD or unitZ. |

        | **inclination** | Wellbore angle from vertical: 0°=down, 90°=horizontal,
        180°=up. |

        | **azimuth** | Direction angle: 0°/360°=North, 90°=East, 180°=South, 270°=West.
        Reference per azimuthReference. |

        | **dx** | East-West displacement from reference point. Positive=East. Unit:
        unitXY. |

        | **dy** | North-South displacement from reference point. Positive=North.
        Unit: unitXY. |

        | **dz** | True Vertical Depth from reference point. Positive=deeper. Unit:
        unitZ. |'
      operationId: convertTrajectory
      parameters:
        - name: data-partition-id
          in: header
          description: The OSDU data partition identifier. Determines which tenant's
            data and CRS configuration to use.
          required: true
          schema:
            type: string
            example: osdu
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertTrajectoryRequestV4'
        required: true
      responses:
        '200':
          description: Trajectory conversion performed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertTrajectoryResponseV4'
        '400':
          description: Bad input format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CRS-converter overloaded; try again later. See HttpHeader 'Retry-After'.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v4/convert:
    post:
      tags:
        - Convert
      summary: Convert a list of points
      description: Convert a set of points from a source CRS to a target CRS. The
        v4 version has benefit of providing explicit transformation.Specifying an
        explicit transformation will override any early binding transformations in
        the fromCRS and toCRS. The CRS Converter will validate that the explicit transformation
        is valid for the fromCRS and toCRS.
      operationId: convertPointV4
      parameters:
        - name: data-partition-id
          in: header
          description: The OSDU data partition identifier. Determines which tenant's
            data and CRS configuration to use.
          required: true
          schema:
            type: string
            example: osdu
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertPointsRequestV4'
        required: true
      responses:
        '200':
          description: Conversion performed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertPointsResponse'
        '400':
          description: Bad input format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unknown error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CRS-converter overloaded; try again later. See HttpHeader 'Retry-After'.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v4/convertGeoJson:
    post:
      tags:
        - Convert
      summary: Convert a GeoJSON or AnyCrsGeoJson structure
      description: Convert a GeoJSON or AnyCrsGeoJson structure to a specified target
        CRS. GeoJSON is declared - by definition - to be in the context of WGS 84.
        The v4 version has benefit of providing explicit transformation as an optional
        field. Specifying an explicit transformation will override any early binding
        transformations in the fromCRS and toCRS. The CRS Converter will validate
        that the explicit transformation is valid for the fromCRS and toCRS.
      operationId: convertGeoJsonV4
      parameters:
        - name: data-partition-id
          in: header
          description: The OSDU data partition identifier. Determines which tenant's
            data and CRS configuration to use.
          required: true
          schema:
            type: string
            example: osdu
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertGeoJsonRequestV4'
        required: true
      responses:
        '200':
          description: Conversion performed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertGeoJsonResponse'
        '400':
          description: Bad input format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unknown error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: CRS-converter overloaded; try again later. See HttpHeader 'Retry-After'.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v4/info:
    get:
      tags:
        - Info Api
      summary: info
      operationId: infoUsingGET
      parameters:
        - name: data-partition-id
          in: header
          description: The OSDU data partition identifier.
          required: true
          schema:
            type: string
            default: opendes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
components:
  securitySchemes:
    Bearer:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    Point:
      type: object
      title: Coordinate Point
      required:
        - x
        - y
      properties:
        x:
          type: number
          format: double
          example: 484074.5862320617
          description: X coordinate value. For geographic CRS this represents longitude
            (in degrees). For projected CRS this represents easting (in the CRS unit,
            typically meters or feet).
        y:
          type: number
          format: double
          example: 5499819.191561815
          description: Y coordinate value. For geographic CRS this represents latitude
            (in degrees). For projected CRS this represents northing (in the CRS unit,
            typically meters or feet).
        z:
          type: number
          format: double
          example: 0
          description: Z coordinate value representing elevation or depth. Positive
            values typically indicate height above the reference surface; interpretation
            depends on the vertical CRS.
      description: A coordinate point in 2D or 3D space. The interpretation of x,
        y, z values depends on the Coordinate Reference System being used.
    TrajectoryStationOut:
      type: object
      title: Output Trajectory Station
      required:
        - azimuthGN
        - azimuthTN
        - dxTN
        - dyTN
        - inclination
        - md
        - point
      properties:
        md:
          type: number
          format: double
          example: 2563.56
          description: Measured Depth (MD) - the distance along the wellbore path
            from the vertical reference point (typically kelly bushing or rotary table).
            Unit is specified by the response's 'unitZ' field.
        inclination:
          type: number
          format: double
          example: 15
          minimum: 0
          maximum: 180
          description: 'Inclination angle in degrees of arc. 0° = vertical (pointing
            down), 90° = horizontal, 180° = vertical (pointing up). Range: 0-180 degrees.'
        azimuthTN:
          type: number
          format: double
          example: 355.96
          minimum: 0
          maximum: 360
          description: 'Azimuth angle referenced to True North in degrees of arc.
            0°/360° = North, 90° = East, 180° = South, 270° = West. Range: 0-360 degrees.'
        azimuthGN:
          type: number
          format: double
          example: 355
          minimum: 0
          maximum: 360
          description: 'Azimuth angle referenced to Grid North in degrees of arc.
            Grid North is the northward direction of the map projection''s grid. Range:
            0-360 degrees.'
        dxTN:
          type: number
          format: double
          example: 55.9
          description: East-West horizontal displacement from the well reference point,
            aligned with True North. Positive = East, Negative = West. Unit is specified
            by the response's 'unitXY' field.
        dyTN:
          type: number
          format: double
          example: -145.3
          description: North-South horizontal displacement from the well reference
            point, aligned with True North. Positive = North, Negative = South. Unit
            is specified by the response's 'unitXY' field.
        dz:
          type: number
          format: double
          example: 2500.0
          description: True Vertical Depth (TVD) - vertical displacement from the
            well reference point. Positive = deeper. Unit is specified by the response's
            'unitZ' field.
        point:
          description: Absolute coordinates of the trajectory station in the trajectoryCRS.
            X and Y are in the CRS units; Z (vertical) uses the unit specified in
            'unitZ'.
          $ref: '#/components/schemas/Point'
        wgs84Longitude:
          type: number
          format: double
          example: -61.45
          description: 'WGS 84 longitude of this station in decimal degrees. Range:
            -180 to +180.'
        wgs84Latitude:
          type: number
          format: double
          example: 10.65
          description: 'WGS 84 latitude of this station in decimal degrees. Range:
            -90 to +90.'
        dls:
          type: number
          format: double
          example: 3.5
          description: Dog Leg Severity (DLS) - the rate of change of wellbore direction,
            typically measured in degrees per 100 feet or degrees per 30 meters. Unit
            is specified by the response's 'unitDls' field.
        original:
          type: boolean
          example: true
          description: Indicates whether this station is from the original input (true)
            or was generated by interpolation (false). Interpolated stations are created
            when the 'interpolate' parameter is true and MD_i values are specified.
      description: Computed output trajectory station containing survey angles, displacements,
        absolute coordinates, and metadata. All values are computed from the input
        stations using the specified calculation method.
    ErrorResponse:
      type: object
      title: Error Response
      properties:
        error:
          type: string
          description: Human-readable error message describing what went wrong
          example: 'Invalid CRS: Unable to parse the provided persistable reference'
        code:
          type: integer
          description: HTTP status code
          example: 400
        reason:
          type: string
          description: Short error reason
          example: Bad Request
      description: Standard error response returned when a CRS conversion operation
        fails. Contains details about the error to help diagnose the issue.
    ConvertTrajectoryRequestV4:
      required:
        - inputStations
        - method
        - trajectoryCRS
        - unitZ
      type: object
      properties:
        trajectoryCRS:
          type: string
          description: Coordinate reference system for the reference point; typically
            the CRS is a projected CRS; if a geographic CRS is provided, the unitXY
            must be defined and the azimuthReference must be TRUE_NORTH.
          example: '"{"wkt":"PROJCS[\"WGS_1984_UTM_Zone_31N\",GEOGCS[\"GCS_WGS_1984\",DATUM[\"D_WGS_1984\",SPHEROID[\"WGS_1984\",6378137.0,298.257223563]],PRIMEM[\"Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],PROJECTION[\"Transverse_Mercator\"],PARAMETER[\"False_Easting\",500000.0],PARAMETER[\"False_Northing\",0.0],PARAMETER[\"Central_Meridian\",3.0],PARAMETER[\"Scale_Factor\",0.9996],PARAMETER[\"Latitude_Of_Origin\",0.0],UNIT[\"Meter\",1.0],AUTHORITY[\"EPSG\",32631]]","ver":"PE_10_3_1","name":"WGS_1984_UTM_Zone_31N","authCode":{"auth":"EPSG","code":"32631"},"type":"LBC"}"'
        azimuthReference:
          type: string
          description: 'Reference direction for interpreting azimuth values in the
            input trajectory stations. TRUE_NORTH (TN): Azimuth measured from geographic/true
            north. GRID_NORTH (GN): Azimuth measured from the map projection''s grid
            north.'
          enum:
            - TRUE_NORTH
            - TN
            - GRID_NORTH
            - GN
          example: TRUE_NORTH
        unitXY:
          type: string
          description: Unit of measure for horizontal displacements (dx, dy) in input
            trajectory stations. Required when inputKind includes deviation values
            (dX_dY_dZ variants). Can be provided as a persistable reference JSON string
            or an OSDU record ID (e.g., 'osdu:reference-data--UnitOfMeasure:m:').
            For projected CRS types, this is automatically derived from the CRS if
            not specified.
          example: 'osdu:reference-data--UnitOfMeasure:m:'
        unitZ:
          type: string
          description: Unit of measure for vertical values (dz, measured depth) in
            input trajectory stations. Required field. Can be provided as a persistable
            reference JSON string or an OSDU record ID.
          example: 'osdu:reference-data--UnitOfMeasure:m:'
        referencePoint:
          $ref: '#/components/schemas/Point'
        inputStations:
          type: array
          description: The array of input trajectory stations
          example:
            - md: 0
              inclination: 0
              azimuth: 0
            - md: 1000
              inclination: 0
              azimuth: 0
            - md: 2000
              inclination: 90
              azimuth: 0
            - md: 3000
              inclination: 90
              azimuth: 0
            - md: 5000
              inclination: 90
              azimuth: 90
            - md: 6000
              inclination: 90
              azimuth: 90
          items:
            $ref: '#/components/schemas/TrajectoryStationInV4'
        method:
          type: string
          description: 'The trajectory computation method to use. AzimuthalEquidistant
            (default): Standard method using azimuthal equidistant projection centered
            at the well location. LMP: Lee''s Modified Proposal (SPE96813) - an alternative
            method for improved accuracy in certain scenarios.'
          enum:
            - AzimuthalEquidistant
            - LMP
          default: AzimuthalEquidistant
          example: AzimuthalEquidistant
        inputKind:
          type: string
          description: 'Specifies the format of input trajectory station data:

            - **MD_Incl_Azim** (default): Measured Depth, Inclination, and Azimuth
            angles

            - **MD_dX_dY_dZ**: Measured Depth with local deviations from reference
            point

            - **dX_dY_dZ**: Local deviations only (MD computed via inverse minimum
            curvature)

            - **MD_Incl**: Inclination-only surveys (azimuth not provided)

            - **MD_X_Y_Z**: Measured Depth with absolute coordinates

            - **X_Y_Z**: Absolute coordinates only'
          enum:
            - MD_Incl_Azim
            - MD_Inclination_Azimuth
            - MD_dX_dY_dZ
            - dX_dY_dZ
            - MD_Incl
            - MD_X_Y_Z
            - X_Y_Z
          default: MD_Incl_Azim
          example: MD_Incl_Azim
        interpolate:
          type: boolean
          description: When true (default), interpolates additional stations at the
            measured depths specified in MD_i. When false, only the original input
            stations are processed (MD_i is ignored).
          default: true
          example: true
        MD_i:
          $ref: '#/components/schemas/MeasuredDepthInterval'
          description: Specifies measured depths where additional trajectory stations
            should be interpolated. Only used when 'interpolate' is true. Provide
            either explicit MD values (md_i array) or a regular interval (md_interval).
        unitMD:
          type: string
          description: Unit of measure for Measured Depth (MD) values. Optional -
            defaults to unitZ if not specified. Useful when MD values are in different
            units than vertical depth values.
          example: 'osdu:reference-data--UnitOfMeasure:m:'
      example:
        azimuthReference: GN
        interpolate: false
        referencePoint:
          x: 400000
          y: 6500000
          z: 100
        unitZ: 'osdu:reference-data--UnitOfMeasure:m:'
        unitMD: 'osdu:reference-data--UnitOfMeasure:m:'
        inputStations:
          - md: 0
            inclination: 0
            azimuth: 20
          - md: 100
            inclination: 10
            azimuth: 40
        MD_i:
          md_i:
            - 50
            - 75
        trajectoryCRS: 'osdu:reference-data--CoordinateReferenceSystem:Projected:EPSG::32631:'
        inputKind: MD_Incl_Azim
        method: AzimuthalEquidistant
    ConvertGeoJsonRequestV4:
      title: Convert GeoJson/AnyCrsGeoJson Request
      description: Request to convert a GeoJSON FeatureCollection or AnyCrsFeatureCollection
        from WGS 84 or AnyCrsFeatureCollection.persistableReferenceCrs to a target
        CRS.
      type: object
      required:
        - featureCollection
        - toCRS
      properties:
        featureCollection:
          $ref: '#/components/schemas/AnyCrsGeoJsonFeatureCollection'
        toCRS:
          title: GeoJson Request
          type: string
          description: The GeoJSON FeatureCollection or AnyCrsFeatureCollection structure
            to be converted/transformed. GeoJSON is always based on WGS 84; AnyCrsFeatureCollection
            carries the CRS context in the persistableReferenceCrs property. This
            value could be persistable reference string or a record ID
        transformation:
          title: Explicit Transformation
          type: string
          description: Explicit Transformation as persistable reference string or
            record id, its optional and if given it will override Bound Transformation.
        toUnitZ:
          type: string
          description: The vertical axis unit for this AnyCrsGeoJsonFeatureCollection
            as persistable reference string or a record ID)
          title: Vertical Unit
      example:
        toCRS: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4267:'
        toUnitZ: 'osdu:reference-data--UnitOfMeasure:m:'
        transformation: 'osdu:reference-data--CoordinateTransformation:EPSG::15851:'
        featureCollection:
          type: AnyCrsFeatureCollection
          CoordinateReferenceSystemID: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4326:'
          persistableReferenceCrs: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4326:'
          persistableReferenceUnitZ: 'osdu:reference-data--UnitOfMeasure:m:'
          features:
            - type: AnyCrsFeature
              properties: {}
              geometry:
                type: AnyCrsPolygon
                coordinates:
                  - - - 697339.525
                      - 7239989.403
                      - 0
                    - - 697339.525
                      - 7239989.5
                      - 0
                    - - 697339.525
                      - 7239989.6
                      - 0
                    - - 697339.525
                      - 7239989.403
                      - 0
                bbox: null
              bbox: null
          bbox: null
          properties: {}
    AnyCrsGeoJsonFeatureCollection:
      title: AnyCrsGeoJSON FeatureCollection
      type: object
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
            - AnyCrsFeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/AnyCrsGeoJsonFeature'
        bbox:
          type: array
          minItems: 4
          items:
            type: number
        persistableReferenceCrs:
          type: string
          description: The spatial context of this AnyCrsGeoJsonFeatureCollection
            as persistable reference string.
          title: Spatial Reference
        CoordinateReferenceSystemID:
          type: string
          description: The spatial context of this AnyCrsGeoJsonFeatureCollection
            as a record ID. If both CoordinateReferenceSystemID and persistableReferenceCrs
            exist, CoordinateReferenceSystemID takes precedence.
          title: Spatial Reference
        VerticalUnitID:
          type: string
          description: The vertical axis unit for this AnyCrsGeoJsonFeatureCollection
            as a record ID. If both VerticalUnitID and persistableReferenceUnitZ exist,
            VerticalUnitID takes precedence.
          title: Vertical Unit
        persistableReferenceUnitZ:
          type: string
          description: The vertical axis unit for this AnyCrsGeoJsonFeatureCollection
            as persistable reference string.
          title: Vertical Unit
    AnyCrsGeoJsonFeature:
      title: AnyCrsGeoJSON Feature
      type: object
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
            - AnyCrsFeature
        properties:
          $ref: '#/components/schemas/AnyProperty'
        geometry:
          $ref: '#/components/schemas/AnyCrsGeoJsonFeatureGeometry'
        bbox:
          type: array
          minItems: 4
          items:
            type: number
    AnyProperty:
      title: Any property extension
      type: object
      additionalProperties:
        type: object
    AnyCrsGeoJsonFeatureGeometry:
      type: object
      description: AnyCrsGeoJSon feature geometry
      discriminator: type
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - Point
            - LineString
            - Polygon
            - MultiPoint
            - MultiLineString
            - MultiPolygon
            - GeometryCollection
            - AnyCrsPoint
            - AnyCrsLineString
            - AnyCrsPolygon
            - AnyCrsMultiPoint
            - AnyCrsMultiLineString
            - AnyCrsMultiPolygon
            - AnyCrsGeometryCollection
          description: the geometry type
        coordinates:
          type: object
    ConvertPointsRequestV4:
      title: Convert Points Request
      required:
        - fromCRS
        - points
        - toCRS
      type: object
      description: Request body for converting coordinate points from one CRS to another.
        Supports explicit transformation specification for precise control over the
        conversion process.
      properties:
        fromCRS:
          type: string
          description: 'Source Coordinate Reference System. Can be specified as:

            - **OSDU Record ID**: e.g., ''osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4326:''

            - **Persistable Reference**: JSON string containing WKT and metadata


            The source CRS defines how the input point coordinates should be interpreted.'
          example: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4326:'
        toCRS:
          type: string
          description: Target Coordinate Reference System. Same format options as
            fromCRS. The output points will be expressed in this CRS.
          example: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4267:'
        points:
          type: array
          description: Array of coordinate points to convert. Each point contains
            x, y, and optionally z values interpreted according to the fromCRS. Minimum
            1 point required.
          minItems: 1
          example:
            - x: -90
              y: 30
              z: 0
          items:
            $ref: '#/components/schemas/Points'
        transformation:
          type: string
          description: Optional explicit coordinate transformation to apply. When
            specified, this overrides any early-bound transformation embedded in the
            CRS definitions. Use this for precise control when multiple valid transformations
            exist between the source and target CRS. Can be an OSDU record ID or persistable
            reference string.
          example: 'osdu:reference-data--CoordinateTransformation:EPSG::15851:'
      example:
        fromCRS: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4326:'
        toCRS: 'osdu:reference-data--CoordinateReferenceSystem:Geographic2D:EPSG::4267:'
        transformation: 'osdu:reference-data--CoordinateTransformation:EPSG::15851:'
        points:
          - x: -90.0
            y: 30.0
            z: 0
    Points:
      title: Input Point
      required:
        - x
        - y
      type: object
      description: A coordinate point for conversion. Coordinate interpretation depends
        on the source CRS type.
      properties:
        x:
          type: number
          description: 'X coordinate value. For geographic CRS: longitude in degrees
            (-180 to +180). For projected CRS: easting in the CRS linear unit.'
          format: double
          example: -90
        y:
          type: number
          description: 'Y coordinate value. For geographic CRS: latitude in degrees
            (-90 to +90). For projected CRS: northing in the CRS linear unit.'
          format: double
          example: 30
        z:
          type: number
          description: Z coordinate value (optional). Represents elevation or depth.
            The interpretation depends on the vertical CRS or datum being used.
          format: double
          example: 0.0
    ConvertPointsResponse:
      title: Convert Points Response
      type: object
      description: Response containing the converted coordinate points and metadata
        about the conversion operation.
      properties:
        successCount:
          type: integer
          description: Number of points successfully converted. Compare with the input
            array length to detect conversion failures. Points that fail conversion
            will have NaN values in the output.
          example: 1
        points:
          type: array
          description: Converted points in the target CRS. Array length and order
            match the input. Failed conversions are represented with NaN (Not a Number)
            values for coordinates.
          items:
            $ref: '#/components/schemas/Points'
          example:
            - x: -89.99993037859349
              y: 29.999797886559996
              z: 0.0
        operationsApplied:
          type: array
          description: Ordered list of coordinate operations (conversions and transformations)
            that were applied during the conversion. Useful for auditing and understanding
            the conversion path.
          items:
            type: string
          example:
            - transformation GCS_WGS_1984 to GCS_North_American_1927 using NAD_1927_To_WGS_1984_79_CONUS;
              1 points successfully transformed
      example:
        successCount: 1
        points:
          - x: -89.99993037859349
            y: 29.999797886559996
            z: 0.0
        operationsApplied:
          - transformation GCS_WGS_1984 to GCS_North_American_1927 using NAD_1927_To_WGS_1984_79_CONUS;
            1 points successfully transformed
    ConvertGeoJsonResponse:
      title: Convert GeoJSON/AnyCrsGeoJson response

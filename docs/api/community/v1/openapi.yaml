        geoJsonVariantInternal:
          type: string
          enum:
          - GEO_JSON
          - ANY_CRS_GEO_JSON
          writeOnly: true
        type:
          type: string
          minLength: 1
        bbox:
          type: array
          items:
            type: number
            format: double
      required:
      - type
    GeoJsonFeature:
      type: object
      properties:
        geoJsonVariantInternal:
          type: string

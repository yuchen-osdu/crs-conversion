          example: "\"{\"lateBoundCRS\":{\"wkt\":\"GEOGCS[\\\"GCS_Provisional_S_American_1956\\\
            \",DATUM[\\\"D_Provisional_S_American_1956\\\",SPHEROID[\\\"International_1924\\\
            \",6378388.0,297.0]],PRIMEM[\\\"Greenwich\\\",0.0],UNIT[\\\"Degree\\\"\
            ,0.0174532925199433],AUTHORITY[\\\"EPSG\\\",4248]]\",\"ver\":\"PE_10_3_1\"\
            ,\"name\":\"GCS_Provisional_S_American_1956\",\"authCode\":{\"auth\":\"\
            EPSG\",\"code\":\"4248\"},\"type\":\"LBC\"},\"singleCT\":{\"wkt\":\"GEOGTRAN[\\\
            \"PSAD_1956_To_WGS_1984_9\\\",GEOGCS[\\\"GCS_Provisional_S_American_1956\\\
            \",DATUM[\\\"D_Provisional_S_American_1956\\\",SPHEROID[\\\"International_1924\\\
            \",6378388.0,297.0]],PRIMEM[\\\"Greenwich\\\",0.0],UNIT[\\\"Degree\\\"\
            ,0.0174532925199433]],GEOGCS[\\\"GCS_WGS_1984\\\",DATUM[\\\"D_WGS_1984\\\
            \",SPHEROID[\\\"WGS_1984\\\",6378137.0,298.257223563]],PRIMEM[\\\"Greenwich\\\
            \",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],METHOD[\\\"Geocentric_Translation\\\
            \"],PARAMETER[\\\"X_Axis_Translation\\\",-295.0],PARAMETER[\\\"Y_Axis_Translation\\\
            \",173.0],PARAMETER[\\\"Z_Axis_Translation\\\",-371.0],AUTHORITY[\\\"\
            EPSG\\\",1209]]\",\"ver\":\"PE_10_3_1\",\"name\":\"PSAD_1956_To_WGS_1984_9\"\
            ,\"authCode\":{\"auth\":\"EPSG\",\"code\":\"1209\"},\"type\":\"ST\"},\"\
            ver\":\"PE_10_3_1\",\"name\":\"PSAD56 * DMA-Ven [4248,1209]\",\"authCode\"\
            :{\"auth\":\"SLB\",\"code\":\"4248009\"},\"type\":\"EBC\"}\""
          minLength: 1
        toCRS:
          type: string
          description: Target CRS as persistable reference string
          example: "\"{\"lateBoundCRS\":{\"wkt\":\"PROJCS[\\\"Trinidad_1903_Trinidad_Grid\\\
            \",GEOGCS[\\\"GCS_Trinidad_1903\\\",DATUM[\\\"D_Trinidad_1903\\\",SPHEROID[\\\
            \"Clarke_1858\\\",6378293.64520876,294.260676369]],PRIMEM[\\\"Greenwich\\\
            \",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],PROJECTION[\\\"Cassini\\\
            \"],PARAMETER[\\\"False_Easting\\\",430000.0],PARAMETER[\\\"False_Northing\\\
            \",325000.0],PARAMETER[\\\"Central_Meridian\\\",-61.3333333333333],PARAMETER[\\\
            \"Scale_Factor\\\",1.0],PARAMETER[\\\"Latitude_Of_Origin\\\",10.4416666666667],UNIT[\\\
            \"Link_Clarke\\\",0.201166195164],AUTHORITY[\\\"EPSG\\\",30200]]\",\"\
            ver\":\"PE_10_3_1\",\"name\":\"Trinidad_1903_Trinidad_Grid\",\"authCode\"\
            :{\"auth\":\"EPSG\",\"code\":\"30200\"},\"type\":\"LBC\"},\"singleCT\"\
            :{\"wkt\":\"GEOGTRAN[\\\"Trinidad_1903_To_WGS_1984_2\\\",GEOGCS[\\\"GCS_Trinidad_1903\\\
            \",DATUM[\\\"D_Trinidad_1903\\\",SPHEROID[\\\"Clarke_1858\\\",6378293.64520876,294.260676369]],PRIMEM[\\\
            \"Greenwich\\\",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],GEOGCS[\\\
            \"GCS_WGS_1984\\\",DATUM[\\\"D_WGS_1984\\\",SPHEROID[\\\"WGS_1984\\\"\
            ,6378137.0,298.257223563]],PRIMEM[\\\"Greenwich\\\",0.0],UNIT[\\\"Degree\\\
            \",0.0174532925199433]],METHOD[\\\"Geocentric_Translation\\\"],PARAMETER[\\\
            \"X_Axis_Translation\\\",-61.0],PARAMETER[\\\"Y_Axis_Translation\\\",285.2],PARAMETER[\\\
            \"Z_Axis_Translation\\\",471.6],AUTHORITY[\\\"EPSG\\\",10085]]\",\"ver\"\
            :\"PE_10_3_1\",\"name\":\"Trinidad_1903_To_WGS_1984_2\",\"authCode\":{\"\
            auth\":\"EPSG\",\"code\":\"10085\"},\"type\":\"ST\"},\"ver\":\"PE_10_3_1\"\
            ,\"name\":\"Trinidad 1903 * EOG-Tto Trin / Trinidad Grid [30200,10085]\"\
            ,\"authCode\":{\"auth\":\"SLB\",\"code\":\"30200002\"},\"type\":\"EBC\"\
            }\""
          minLength: 1
        points:
          type: array
          description: List of points to be converted
          example:
          - x: -61.04340628871454
            "y": 10.673103179456877
            z: 0
          items:
            $ref: "#/components/schemas/Point"
          minItems: 1
        transformation:
          type: string
          description: CRS Transform
          example: "\"{\"wkt\":\"GEOGTRAN[\\\"PSAD_1956_To_WGS_1984_9\\\",GEOGCS[\\\
            \"GCS_Provisional_S_American_1956\\\",DATUM[\\\"D_Provisional_S_American_1956\\\
            \",SPHEROID[\\\"International_1924\\\",6378388.0,297.0]],PRIMEM[\\\"Greenwich\\\
            \",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],GEOGCS[\\\"GCS_WGS_1984\\\
            \",DATUM[\\\"D_WGS_1984\\\",SPHEROID[\\\"WGS_1984\\\",6378137.0,298.257223563]],PRIMEM[\\\
            \"Greenwich\\\",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],METHOD[\\\
            \"Geocentric_Translation\\\"],PARAMETER[\\\"X_Axis_Translation\\\",-295.0],PARAMETER[\\\
            \"Y_Axis_Translation\\\",173.0],PARAMETER[\\\"Z_Axis_Translation\\\",-371.0],AUTHORITY[\\\
            \"EPSG\\\",1209]]\",\"ver\":\"PE_10_3_1\",\"name\":\"PSAD_1956_To_WGS_1984_9\"\
            ,\"authCode\":{\"auth\":\"EPSG\",\"code\":\"1209\"},\"type\":\"ST\"}\""
      required:
      - fromCRS
      - points
      - toCRS
    Point:
      type: object
      description: "A 3D coordinate point. Interpretation of x, y, z depends on the\
        \ Coordinate Reference System (CRS). For geographic CRS: x=longitude, y=latitude.\
        \ For projected CRS: x=easting, y=northing."
      properties:
        x:
          type: string
          format: double
          description: "X coordinate value. For geographic CRS: longitude in degrees\
            \ (-180 to +180). For projected CRS: easting in CRS units (typically meters)."
          example: "-61.043406288714543"
        "y":
          type: string
          format: double
          description: "Y coordinate value. For geographic CRS: latitude in degrees\
            \ (-90 to +90). For projected CRS: northing in CRS units (typically meters)."
          example: "10.673103179456877"
        z:
          type: string
          format: double
          description: Z coordinate value representing elevation or depth. Unit specified
            by unitZ. Positive typically indicates height above reference surface.
          example: "0.0"
      required:
      - x
      - "y"
      - z
    ConvertPointsResponse:
      type: object
      description: Response of a CRS conversion/transformation operation
      properties:
        successCount:
          type: string
          description: Number of points successfully converted. If the number is less
            than the request array length conversion/transformation failures occurred.
        points:
          type: array
          description: "Converted points; length and order of the array is the same\
            \ as in the request. Points, which failed to convert, are returned as\
            \ NaN."
          items:
            $ref: "#/components/schemas/Point"
        operationsApplied:
          type: array
          description: The list of operations performed on the points as a list of
            strings
          items:
            type: string
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    ConvertTrajectoryRequestV4:
      type: object
      description: "Input trajectory data structure; contains the context (crs, units,\
        \ azimuth reference, method)"
      properties:
        md_i:
          $ref: "#/components/schemas/MinimumDepthInterval"
        trajectoryCRS:
          type: string
          description: "Coordinate reference system for the reference point; typically\
            \ the CRS is a projected CRS; if a geographic CRS is provided, the unitXY\
            \ must be defined and the azimuthReference must be TRUE_NORTH."
          example: "\"{\"wkt\":\"PROJCS[\\\"WGS_1984_UTM_Zone_31N\\\",GEOGCS[\\\"\
            GCS_WGS_1984\\\",DATUM[\\\"D_WGS_1984\\\",SPHEROID[\\\"WGS_1984\\\",6378137.0,298.257223563]],PRIMEM[\\\
            \"Greenwich\\\",0.0],UNIT[\\\"Degree\\\",0.0174532925199433]],PROJECTION[\\\
            \"Transverse_Mercator\\\"],PARAMETER[\\\"False_Easting\\\",500000.0],PARAMETER[\\\
            \"False_Northing\\\",0.0],PARAMETER[\\\"Central_Meridian\\\",3.0],PARAMETER[\\\
            \"Scale_Factor\\\",0.9996],PARAMETER[\\\"Latitude_Of_Origin\\\",0.0],UNIT[\\\
            \"Meter\\\",1.0],AUTHORITY[\\\"EPSG\\\",32631]]\",\"ver\":\"PE_10_3_1\"\
            ,\"name\":\"WGS_1984_UTM_Zone_31N\",\"authCode\":{\"auth\":\"EPSG\",\"\
            code\":\"32631\"},\"type\":\"LBC\"}\""
          minLength: 1
        azimuthReference:
          type: string
          description: "Reference direction for azimuth angles. TRUE_NORTH (TN): measured\
            \ from geographic true north. GRID_NORTH (GN): measured from map projection\
            \ grid north. The difference is the grid convergence angle."
          example: TRUE_NORTH
        unitXY:
          type: string
          description: "Unit of measure for horizontal displacements (dx, dy). Required\
            \ for dX_dY_dZ input kinds. Can be OSDU record ID (e.g., 'osdu:reference-data--UnitOfMeasure:m:')\
            \ or persistable reference JSON. Auto-derived from projected CRS if not\
            \ specified."
          example: "\"{\"scaleOffset\":{\"scale\":1.0,\"offset\":0.0},\"symbol\":\"\
            m\",\"baseMeasurement\":{\"ancestry\":\"Length\",\"type\":\"UM\"},\"type\"\
            :\"USO\"}\""
        unitZ:
          type: string
          description: "Unit of measure for vertical values (dz) and measured depth.\
            \ Required field. Can be OSDU record ID (e.g., 'osdu:reference-data--UnitOfMeasure:m:')\
            \ or persistable reference JSON."
          example: "\"{\"scaleOffset\":{\"scale\":1.0,\"offset\":0.0},\"symbol\":\"\
            m\",\"baseMeasurement\":{\"ancestry\":\"Length\",\"type\":\"UM\"},\"type\"\
            :\"USO\"}\""
          minLength: 1
        referencePoint:
          $ref: "#/components/schemas/Point"
          description: The 3D reference point in the 'trajectoryCRS' where MD==0.
        inputStations:
          type: array
          description: The array of input trajectory stations
          items:
            $ref: "#/components/schemas/TrajectoryStationInV4"
          minItems: 1
        method:
          type: string
          description: "Computation method: 'AzimuthalEquidistant' (default) - standard\
            \ method using azimuthal equidistant projection centered at well location.\
            \ 'LMP' - Lee's Modified Proposal (SPE96813) for improved accuracy at\
            \ extreme latitudes."
          example: AzimuthalEquidistant
          minLength: 1
        inputKind:
          type: string
          description: "Format of input data: MD_Incl_Azim (default) - measured depth\
            \ with inclination and azimuth angles. MD_dX_dY_dZ - measured depth with\
            \ local deviations. dX_dY_dZ - deviations only (MD computed via inverse\
            \ minimum curvature). MD_Incl - inclination-only surveys (no azimuth)."
          example: MD_Inclination_Azimuth
        interpolate:
          type: string
          description: "When true (default), interpolates additional stations at MD\
            \ values specified in MD_i. When false, only original input stations are\
            \ processed and MD_i is ignored."
          example: "True"
        MD_i:
          $ref: "#/components/schemas/MinimumDepthInterval"
          description: Specifies measured depths where additional trajectory stations
            should be interpolated. Only used when 'interpolate' is true. Provide
            either explicit MD values (md_i array) or a regular interval (md_interval).
        unitMD:
          type: string
          description: Unit of measure for Measured Depth (MD) values. Optional -
            defaults to unitZ if not specified.
          example: "\"{\"scaleOffset\":{\"scale\":1.0,\"offset\":0.0},\"symbol\":\"\
            m\",\"baseMeasurement\":{\"ancestry\":\"Length\",\"type\":\"UM\"},\"type\"\
            :\"USO\"}\""
      required:
      - inputStations
      - method
      - trajectoryCRS
      - unitZ
    MinimumDepthInterval:
      type: object
      description: "Specifies where to interpolate additional trajectory stations.\
        \ Provide explicit MD values (md_i array) OR a regular interval (md_interval),\
        \ not both."
      properties:
        md_i:
          type: array
          description: Explicit list of Measured Depth values where interpolated stations
            should be computed. Unit specified by unitMD or unitZ.
          example: "200"
          items:
            type: number
            format: double
        md_interval:
          type: number
          format: double
          description: Regular interval for generating interpolated stations. Stations
            created from first to last input MD at this interval.
          example: "25.0"
    TrajectoryStationInV4:
      type: object
      description: "Input trajectory survey station. Required fields depend on inputKind:\
        \ MD_Incl_Azim requires md, inclination, azimuth. dX_dY_dZ variants require\
        \ dx, dy, dz."
      properties:
        md:
          type: string
          format: double
          description: "Measured Depth - distance along the wellbore from the reference\
            \ point (e.g., kelly bushing). Unit specified by unitMD or unitZ. Required\
            \ for most inputKind values."
          example: "2563.56"
        inclination:
          type: string
          format: double
          description: "Wellbore inclination angle in degrees. 0° = vertical (down),\
            \ 90° = horizontal, 180° = vertical (up). Range: 0-180. Required for MD_Incl_Azim\
            \ and MD_Incl inputKind."
          example: "15.0"
        azimuth:
          type: string
          format: double
          description: "Wellbore azimuth (direction) angle in degrees. 0°/360° = North,\
            \ 90° = East, 180° = South, 270° = West. Range: 0-360. Reference (True\
            \ North or Grid North) specified by azimuthReference."
          example: "355.0"
        dx:
          type: string
          format: double
          description: East-West displacement from well reference point. Positive
            = East. Used for dX_dY_dZ and MD_dX_dY_dZ inputKind. Unit specified by
            unitXY.
          example: "55.9"
        dy:
          type: string
          format: double
          description: North-South displacement from well reference point. Positive
            = North. Y-axis alignment (True North or Grid North) depends on azimuthReference.
            Unit specified by unitXY.
          example: "-145.3"
        dz:
          type: string
          format: double
          description: True Vertical Depth (TVD) from well reference point. Positive
            = deeper/downward. Unit specified by unitZ.
          example: "1965.6"
    ConvertTrajectoryResponseV4:
      type: object
      description: "Trajectory response containing computed stations with positions,\
        \ deviations, and WGS84 coordinates. Includes scale factor and convergence\
        \ data for the GNL method."
      properties:
        unitMD:
          type: string
          description: Unit of measure for Measured Depth (MD) values. Optional -
            defaults to unitZ if not specified.
        trajectoryCRS:
          type: string
          description: "Coordinate reference system for the reference point; typically\
            \ the CRS is a projected CRS; if a geographic CRS is provided, the unitXY\
            \ must be defined and the azimuthReference must be TRUE_NORTH."
          example:
            authCode:
              auth: SLB
              code: "30200002"
            lateBoundCRS:
              authCode:
                auth: EPSG
                code: "30200"
              name: Trinidad_1903_Trinidad_Grid
              type: LBC
              ver: PE_10_3_1
              wkt: "PROJCS[\"Trinidad_1903_Trinidad_Grid\",GEOGCS[\"GCS_Trinidad_1903\"\
                ,DATUM[\"D_Trinidad_1903\",SPHEROID[\"Clarke_1858\",6378293.64520876,294.260676369]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],PROJECTION[\"\
                Cassini\"],PARAMETER[\"False_Easting\",430000.0],PARAMETER[\"False_Northing\"\
                ,325000.0],PARAMETER[\"Central_Meridian\",-61.3333333333333],PARAMETER[\"\
                Scale_Factor\",1.0],PARAMETER[\"Latitude_Of_Origin\",10.4416666666667],UNIT[\"\
                Link_Clarke\",0.201166195164],AUTHORITY[\"EPSG\",30200]]"
            name: "Trinidad 1903 * EOG-Tto Trin / Trinidad Grid [30200,10085]"
            singleCT:
              authCode:
                auth: EPSG
                code: "10085"
              name: Trinidad_1903_To_WGS_1984_2
              type: ST
              ver: PE_10_3_1
              wkt: "GEOGTRAN[\"Trinidad_1903_To_WGS_1984_2\",GEOGCS[\"GCS_Trinidad_1903\"\
                ,DATUM[\"D_Trinidad_1903\",SPHEROID[\"Clarke_1858\",6378293.64520876,294.260676369]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],GEOGCS[\"GCS_WGS_1984\"\
                ,DATUM[\"D_WGS_1984\",SPHEROID[\"WGS_1984\",6378137.0,298.257223563]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],METHOD[\"Geocentric_Translation\"\
                ],PARAMETER[\"X_Axis_Translation\",-61.0],PARAMETER[\"Y_Axis_Translation\"\
                ,285.2],PARAMETER[\"Z_Axis_Translation\",471.6],AUTHORITY[\"EPSG\"\
                ,10085]]"
            type: EBC
            ver: PE_10_3_1
          minLength: 1
        unitXY:
          type: string
          description: "Unit of measure for horizontal deviations (dxTN, dyTN) in\
            \ output trajectory stations."
          example:
            scaleOffset:
              scale: 1.0
              offset: 0.0
            symbol: m
            baseMeasurement:
              ancestry: Length
              type: UM
            type: USO
          minLength: 1
        unitZ:
          type: string
          description: Unit of measure for vertical deviation (dZ) and point.z elevation
            in output trajectory stations.
          example:
            scaleOffset:
              scale: 1.0
              offset: 0.0
            symbol: m
            baseMeasurement:
              ancestry: Length
              type: UM
            type: USO
          minLength: 1
        unitDls:
          type: string
          description: Unit of measure for Dog Leg Severity (DLS) values. Automatically
            set to deg/100ft (non-metric) or deg/30m (metric) based on unitZ.
          example: '%7B%22ScaleOffset%22%3A%7B%22Scale%22%3A5.72614583987641E-4%2C%22Offset%22%3A0.0%7D%2C%22Symbol%22%3A%22deg%2F100ft%22%2C%22BaseMeasurement%22%3A%22%257B%2522Ancestry%2522%253A%2522Rotation_Per_Length%2522%257D%22%7D'
          minLength: 1
        stations:
          type: array
          description: "Computed trajectory stations from original input. Each station\
            \ includes absolute coordinates, local deviations, and WGS84 lat/long."
          items:
            $ref: "#/components/schemas/TrajectoryStationOut"
          minItems: 1
        localCRS:
          type: string
          description: "Local Azimuthal Equidistant CRS centered at the well's surface\
            \ location. True North oriented, true distance engineering CRS."
          example:
            authCode:
              auth: SLB
              code: "30200002"
            lateBoundCRS:
              authCode:
                auth: EPSG
                code: "30200"
              name: Trinidad_1903_Trinidad_Grid
              type: LBC
              ver: PE_10_3_1
              wkt: "PROJCS[\"Trinidad_1903_Trinidad_Grid\",GEOGCS[\"GCS_Trinidad_1903\"\
                ,DATUM[\"D_Trinidad_1903\",SPHEROID[\"Clarke_1858\",6378293.64520876,294.260676369]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],PROJECTION[\"\
                Cassini\"],PARAMETER[\"False_Easting\",430000.0],PARAMETER[\"False_Northing\"\
                ,325000.0],PARAMETER[\"Central_Meridian\",-61.3333333333333],PARAMETER[\"\
                Scale_Factor\",1.0],PARAMETER[\"Latitude_Of_Origin\",10.4416666666667],UNIT[\"\
                Link_Clarke\",0.201166195164],AUTHORITY[\"EPSG\",30200]]"
            name: "Trinidad 1903 * EOG-Tto Trin / Trinidad Grid [30200,10085]"
            singleCT:
              authCode:
                auth: EPSG
                code: "10085"
              name: Trinidad_1903_To_WGS_1984_2
              type: ST
              ver: PE_10_3_1
              wkt: "GEOGTRAN[\"Trinidad_1903_To_WGS_1984_2\",GEOGCS[\"GCS_Trinidad_1903\"\
                ,DATUM[\"D_Trinidad_1903\",SPHEROID[\"Clarke_1858\",6378293.64520876,294.260676369]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],GEOGCS[\"GCS_WGS_1984\"\
                ,DATUM[\"D_WGS_1984\",SPHEROID[\"WGS_1984\",6378137.0,298.257223563]],PRIMEM[\"\
                Greenwich\",0.0],UNIT[\"Degree\",0.0174532925199433]],METHOD[\"Geocentric_Translation\"\
                ],PARAMETER[\"X_Axis_Translation\",-61.0],PARAMETER[\"Y_Axis_Translation\"\
                ,285.2],PARAMETER[\"Z_Axis_Translation\",471.6],AUTHORITY[\"EPSG\"\
                ,10085]]"
            type: EBC
            ver: PE_10_3_1
          minLength: 1
        method:
          type: string
          description: The computation method used. AzimuthalEquidistant or LMP (Lee's
            Modified Proposal).
          example: AzimuthalEquidistant
          minLength: 1
        operationsApplied:
          type: array
          description: The list of operations performed on the points as a list of
            strings
          items:
            type: string
        stations_i:
          type: array
          description: Interpolated trajectory stations at MD_i depths. Only present
            when interpolation was requested. Same structure as main stations.
          items:
            $ref: "#/components/schemas/TrajectoryStationOut"
        scaleConvergenceList:
          type: array
          description: Scale factor and convergence values computed at first and last
            stations. Used for precise surveying calculations.
          items:
            $ref: "#/components/schemas/ScaleConvergence"
        inputKind:
          type: string
          description: "Format of input data: MD_Incl_Azim (default) - measured depth\
            \ with inclination and azimuth angles. MD_dX_dY_dZ - measured depth with\
            \ local deviations. dX_dY_dZ - deviations only (MD computed via inverse\
            \ minimum curvature). MD_Incl - inclination-only surveys (no azimuth)."
          example: MD_Inclination_Azimuth
      required:
      - localCRS
      - method
      - stations
      - trajectoryCRS
      - unitDls
      - unitXY
      - unitZ
    ScaleConvergence:
      type: object
      description: Scale factor and convergence values computed at first and last
        stations. Used for precise surveying calculations.
      properties:
        scalefactor:
          type: string
          format: double
          description: "Point scale factor at this location. Ratio of grid distance\
            \ to true ground distance. For UTM, typically ~0.9996 at central meridian."
          example: "Point scale factor at this location. Ratio of grid distance to\
            \ true ground distance. For UTM, typically ~0.9996 at central meridian."
        convergence:
          type: string
          format: double
          description: Grid convergence angle in degrees. Angle between True North
            and Grid North at this location. Used to convert between TN and GN azimuths.
          example: Grid convergence angle in degrees. Angle between True North and
            Grid North at this location. Used to convert between TN and GN azimuths.
        point:
          type: string
          format: double
          description: "Absolute 3D coordinates in trajectoryCRS. x/y in CRS units,\
            \ z in unitZ (elevation above reference, negative for depth below)."
          example: "Absolute 3D coordinates in trajectoryCRS. x/y in CRS units, z\
            \ in unitZ (elevation above reference, negative for depth below)."
    TrajectoryStationOut:
      type: object
      description: "Computed output trajectory station with survey angles, displacements,\
        \ absolute coordinates, WGS84 position, and metadata."
      properties:
        md:
          type: string
          format: double
          description: "Measured Depth - distance along the wellbore from the reference\
            \ point (e.g., kelly bushing). Unit specified by unitMD or unitZ. Required\
            \ for most inputKind values."
          example: "2563.56"
        inclination:
          type: string
          format: double
          description: "Wellbore inclination angle in degrees. 0° = vertical (down),\
            \ 90° = horizontal, 180° = vertical (up). Range: 0-180. Required for MD_Incl_Azim\
            \ and MD_Incl inputKind."
          example: "15.0"
        azimuthTN:
          type: string
          format: double
          description: "Wellbore azimuth relative to True North in degrees. Range:\
            \ 0-360. 0°/360° = True North, 90° = East."
          example: "355.96"
        azimuthGN:
          type: string
          format: double
          description: "Wellbore azimuth relative to Grid North in degrees. Range:\
            \ 0-360. Differs from TN azimuth by the grid convergence angle."
          example: "355.0"
        dxTN:
          type: string
          format: double
          description: "True East-West displacement from reference point. Positive\
            \ = East. Aligned with True North reference frame. Unit: unitXY."
          example: "55.9"
        dyTN:
          type: string
          format: double
          description: "True North-South displacement from reference point. Positive\
            \ = North. Aligned with True North reference frame. Unit: unitXY."
          example: "-145.3"
        point:
          type: string
          format: double
          description: "Absolute 3D coordinates in trajectoryCRS. x/y in CRS units,\
            \ z in unitZ (elevation above reference, negative for depth below)."
        wgs84Longitude:
          type: string
          format: double
          description: "WGS 84 longitude in decimal degrees. Range: -180 to +180.\
            \ Computed from the station's absolute position."
        wgs84Latitude:
          type: string
          format: double
          description: "WGS 84 latitude in decimal degrees. Range: -90 to +90. Computed\
            \ from the station's absolute position."
        dls:
          type: string
          format: double
          description: Dog Leg Severity - rate of change of wellbore direction. Unit
            specified by unitDls (typically deg/100ft or deg/30m).
        original:
          type: string
          format: double
          description: True if this station is from original input. False if generated
            by interpolation at an MD_i value.
        dz:
          type: number
          format: double
    ConvertGeoJsonRequestV4:
      type: object
      description: Request to convert a GeoJSON FeatureCollection or AnyCrsFeatureCollection
        from WGS 84 or 'AnyCrsFeatureCollection.persistableReferenceCrs to a target
        CRS.' to a target CRS
      properties:
        toCRS:
          type: string
          description: Target CRS as persistable reference string
          example: "\"{\"authCode\":{\"auth\":\"EPSG\",\"code\":\"4326\"},\"name\"\
            :\"GCS_WGS_1984\",\"type\":\"LBC\",\"ver\":\"PE_10_3_1\",\"wkt\":\"GEOGCS[\\\
            \"GCS_WGS_1984\\\",DATUM[\\\"D_WGS_1984\\\",SPHEROID[\\\"WGS_1984\\\"\
            ,6378137.0,298.257223563]],PRIMEM[\\\"Greenwich\\\",0.0],UNIT[\\\"Degree\\\
            \",0.0174532925199433],AUTHORITY[\\\"EPSG\\\",4326]]\"}\""
          minLength: 1
        toUnitZ:
          type: string
          description: "Optional: the target Z-unit for the z-axis scaling."
          example: "\"{\"baseMeasurement\":{\"ancestry\":\"Length\",\"type\":\"UM\"\
            },\"scaleOffset\":{\"offset\":0.0,\"scale\":1.0},\"symbol\":\"m\",\"type\"\
            :\"USO\"}\""
        transformation:
          type: string
          description: "Explicit Transformation as persistable reference string or\
            \ record id, its optional and if given it will override Bound Transformation "
          example: "osdu:reference-data--CoordinateTransformation:EPSG::15851:"
        featureCollection:
          $ref: "#/components/schemas/GeoJsonFeatureCollection"
          description: The GeoJSON FeatureCollection or AnyCrsFeatureCollection structure
            to be converted/transformed. GeoJSON is always based on WGS 84; AnyCrsFeatureCollection
            carries the CRS context in the persistableReferenceCrs property. GeoJSON
            WGS 84 or the persistableReferenceCrs are taken as the 'fromCRS'.
      required:
      - featureCollection
      - toCRS
    GeoJsonBase:
      type: object
      discriminator:
        propertyName: type

  /v4/convertTrajectory:
    post:
      tags:
      - CRS Point Conversion
      - Convert
      summary: Convert trajectory stations
      description: |-
        Convert a list of trajectory stations, given the unit and spatial context and a reference point in 3D where MD==0. For survey MD, Incl, Azi input, minimum curvature is used to calculate the local deviations and absolute coordinates. For MD_dX,dY,dZ, the inverse minimum curvature is first applied to compute Inc and Azi.

         **Interpolation Feature**: When `interpolate=true` (default), additional stations can be generated at specified measured depths using the `MD_i` parameter:
         - Use `MD_i.md_i` for explicit MD values, e.g., [50, 75, 150]
         - Use `MD_i.md_interval` for regular spacing, e.g., 25 for every 25 units
         - Interpolated stations use minimum curvature interpolation for inc/azi and position
         - Response stations include `original: true/false` to distinguish survey vs interpolated
         - Set `interpolate=false` to process only original survey stations (MD_i is ignored)

         ## Request Body Parameters

         | Parameter | Type | Required | Description |
         |-----------|------|----------|-------------|
         | **trajectoryCRS** | string | Yes | Coordinate reference system for the reference point. Typically a projected CRS; if geographic CRS, unitXY must be defined and azimuthReference must be TRUE_NORTH. |
         | **referencePoint** | Point | Yes | The well surface location (x, y, z) where MD=0. Coordinates are in trajectoryCRS units. |
         | **inputStations** | array | Yes | Array of input trajectory stations. Required fields depend on inputKind. |
         | **unitZ** | string | Yes | Unit of measure for vertical values (dz) and measured depth. OSDU record ID or persistable reference JSON. |
         | **method** | string | Yes | Computation method: 'AzimuthalEquidistant' (default) or 'LMP' (Lee's Modified Proposal SPE96813). |
         | **azimuthReference** | string | No | Reference for azimuth angles: TRUE_NORTH (TN) or GRID_NORTH (GN). Default: TRUE_NORTH. |
         | **unitXY** | string | No | Unit for horizontal displacements (dx, dy). Required for dX_dY_dZ input kinds. Auto-derived from projected CRS if not specified. |
         | **unitMD** | string | No | Unit for Measured Depth values. Defaults to unitZ if not specified. |
         | **inputKind** | string | No | Input format: MD_Incl_Azim (default), MD_dX_dY_dZ, dX_dY_dZ, MD_Incl, MD_X_Y_Z, X_Y_Z. |
         | **interpolate** | boolean | No | When true (default), interpolates stations at MD_i depths. When false, only original stations processed. |
         | **MD_i** | object | No | Interpolation specification: md_i (array of specific depths) or md_interval (regular spacing). |

         ## Input Station Fields (TrajectoryStationInV4)

         | Field | Description |
         |-------|-------------|
         | **md** | Measured Depth - distance along wellbore from reference point. Unit: unitMD or unitZ. |
         | **inclination** | Wellbore angle from vertical: 0Â°=down, 90Â°=horizontal, 180Â°=up. |
         | **azimuth** | Direction angle: 0Â°/360Â°=North, 90Â°=East, 180Â°=South, 270Â°=West. Reference per azimuthReference. |
         | **dx** | East-West displacement from reference point. Positive=East. Unit: unitXY. |
         | **dy** | North-South displacement from reference point. Positive=North. Unit: unitXY. |
         | **dz** | True Vertical Depth from reference point. Positive=deeper. Unit: unitZ. |
      operationId: convertTrajectory
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:

              - $ref: "#/components/schemas/GeoJsonFeatureCollection"
              - $ref: "#/components/schemas/GeoJsonGeometryCollection"
              - $ref: "#/components/schemas/GeoJsonLineString"
              - $ref: "#/components/schemas/GeoJsonMultiLineString"
              - $ref: "#/components/schemas/GeoJsonMultiPoint"
              - $ref: "#/components/schemas/GeoJsonMultiPolygon"
              - $ref: "#/components/schemas/GeoJsonPoint"
              - $ref: "#/components/schemas/GeoJsonPolygon"
      required:
      - type
    GeoJsonLineString:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:
          coordinates:
            type: array
            items:
              type: array
              items:
                type: number
                format: double
      required:
      - type
    GeoJsonMultiLineString:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:
          coordinates:
            type: array
            items:
              type: array
              items:
                type: array
                items:
                  type: number
                  format: double
      required:
      - type
    GeoJsonMultiPoint:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:
          coordinates:
            type: array
            items:
              type: array
              items:
                type: number
                format: double
      required:
      - type
    GeoJsonMultiPolygon:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:
          coordinates:
            type: array
            items:
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
                    format: double
      required:
      - type
    GeoJsonPoint:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:
          coordinates:
            type: array
            items:
              type: number
              format: double
      required:
      - type
    GeoJsonPolygon:
      allOf:
      - $ref: "#/components/schemas/GeoJsonBase"
      - type: object
        properties:

    ConvertGeoJsonRequest:
      type: object
      description: Request to convert a GeoJSON FeatureCollection or AnyCrsFeatureCollection
        from WGS 84 or 'AnyCrsFeatureCollection.persistableReferenceCrs to a target
        CRS.' to a target CRS
      properties:
        toCRS:
          type: string
          description: Target CRS as persistable reference string
          example: "\"{\"authCode\":{\"auth\":\"EPSG\",\"code\":\"4326\"},\"name\"\
            :\"GCS_WGS_1984\",\"type\":\"LBC\",\"ver\":\"PE_10_3_1\",\"wkt\":\"GEOGCS[\\\
            \"GCS_WGS_1984\\\",DATUM[\\\"D_WGS_1984\\\",SPHEROID[\\\"WGS_1984\\\"\
            ,6378137.0,298.257223563]],PRIMEM[\\\"Greenwich\\\",0.0],UNIT[\\\"Degree\\\
            \",0.0174532925199433],AUTHORITY[\\\"EPSG\\\",4326]]\"}\""
          minLength: 1
        toUnitZ:
          type: string
          description: "Optional: the target Z-unit for the z-axis scaling."
          example: "\"{\"baseMeasurement\":{\"ancestry\":\"Length\",\"type\":\"UM\"\
            },\"scaleOffset\":{\"offset\":0.0,\"scale\":1.0},\"symbol\":\"m\",\"type\"\
            :\"USO\"}\""
        featureCollection:
          $ref: "#/components/schemas/GeoJsonFeatureCollection"
          description: The GeoJSON FeatureCollection or AnyCrsFeatureCollection structure
            to be converted/transformed. GeoJSON is always based on WGS 84; AnyCrsFeatureCollection
            carries the CRS context in the persistableReferenceCrs property. GeoJSON
            WGS 84 or the persistableReferenceCrs are taken as the 'fromCRS'.
      required:
      - featureCollection
      - toCRS
    AbstractAnyCrsFeatureCollection:
      type: object
      properties:
        coordinateReferenceSystemID:
          type: string
        persistableReferenceCrs:
          type: string
        CoordinateReferenceSystemID:
          type: string
        type:
          type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/AbstractFeature"
    AbstractBinGrid:
      type: object
      properties:
        abcdbinGridSpatialLocation:
          $ref: "#/components/schemas/AbstractSpatialLocation"
        BinGridName:
          type: string
        BinGridTypeID:
          type: string
        SourceBinGridID:
          type: integer
          format: int32
        SourceBinGridAppID:
          type: string
        CoveragePercent:
          type: number
          format: double
        BinGridDefinitionMethodTypeID:
          type: string
        P6TransformationMethod:
          type: integer
          format: int32
        P6BinGridOriginI:
          type: number
          format: double
        P6BinGridOriginJ:
          type: number
          format: double
        P6BinGridOriginEasting:
          type: number
          format: double
        P6BinGridOriginNorthing:
          type: number
          format: double
        P6ScaleFactorOfBinGrid:
          type: number
          format: double
        P6BinWidthOnIaxis:
          type: number
          format: double
        P6BinWidthOnJaxis:
          type: number
          format: double
        P6MapGridBearingOfBinGridJaxis:
          type: number
          format: double
        P6BinNodeIncrementOnIaxis:
          type: integer
          format: int32
        P6BinNodeIncrementOnJaxis:
          type: integer
          format: int32
        ABCDBinGridSpatialLocation:
          $ref: "#/components/schemas/AbstractSpatialLocation"
    AbstractFeature:
      type: object
      properties:
        type:
          type: string
        properties:
          $ref: "#/components/schemas/PropertiesBinGridCorners"
        geometry:
          $ref: "#/components/schemas/Geometry"
    AbstractFeatureCollection:
      type: object
      properties:
        features:
          type: array
          items:
            $ref: "#/components/schemas/AbstractFeature"
        type:
          type: string
    AbstractSpatialLocation:
      type: object
      properties:
        SpatialLocationCoordinatesDate:
          type: string
        QuantitativeAccuracyBandID:
          type: string
        QualitativeSpatialAccuracyTypeID:
          type: string
        CoordinateQualityCheckPerformedBy:
          type: string
        CoordinateQualityCheckDateTime:
          type: string
        CoordinateQualityCheckRemarks:
          type: array
          items:
            type: string
        AppliedOperations:
          type: array
          items:
            type: string
        SpatialParameterTypeID:
          type: string
        SpatialGeometryTypeID:
          type: string
        AsIngestedCoordinates:
          $ref: "#/components/schemas/AbstractAnyCrsFeatureCollection"
        Wgs84Coordinates:
          $ref: "#/components/schemas/AbstractFeatureCollection"
    ConvertBinGridRequest:
      type: object
      properties:
        toCRS:
          type: string
        inBinGrid:
          $ref: "#/components/schemas/AbstractBinGrid"
    Geometry:
      type: object
      properties:
        type:
          type: string
          minLength: 1
        coordinates:
          type: array
          items:
            type: number
            format: double
          minItems: 1
      required:
      - coordinates
      - type
    PointProperties:
      type: object
      properties:
        Label:
          type: string
        Inline:
          type: integer
          format: int32
        Crossline:
          type: integer
          format: int32
    PropertiesBinGridCorners:
      type: object
      properties:
        Kind:
          type: string
        PointProperties:
          type: array
          items:
            $ref: "#/components/schemas/PointProperties"
    ConvertBinGridResponse:
      type: object
      properties:
        maxMisLocation:
          $ref: "#/components/schemas/MaxMisLocation"
        outBinGrid:
          $ref: "#/components/schemas/AbstractBinGrid"
        AppliedOperations:
          type: array
          items:
            type: string
    MaxMisLocation:
      type: object
      properties:
        di:
          type: number
          format: double
        dj:
          type: number
          format: double
        dI:
          type: number
          format: double
        dJ:
          type: number
          format: double
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization

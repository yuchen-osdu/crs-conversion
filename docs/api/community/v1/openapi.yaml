  /v3/convertBinGrid:
    post:
      tags:
      - crs-converter-api-v3
      summary: "CRS Convert service is an OSDU platform standard method for QC and\
        \ conversion of Bin Grids, associated in particular with ingested seismic\
        \ volumes, that describe the `real world` (Easting, Northing) of bin grid\
        \ centers at (inline, crossline) local coordinates"
      description: |-
        QC check of the `squareness` of a Bin Grid defined using 4 corner points.
         + Coordinate conversion of a Bin Grid to a new CRS and `square it up` (if target CRS is same as original CRS then conversion is omitted, and the squareness test is done in the original CRS).
         + Calculate derived P6 parameters from the input 4 corners.
         + Calculate WGS 84 coordinates at the corners
         + Returns converted Bin Grid and a QC of squareness of the bin grid
      operationId: convertBinGrid
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertBinGridRequest"
        required: true
      responses:
        "200":
          description: "The response is essentially a measure of the computed “non-squareness”\
            \ (dI,dJ) of the input BinGrid, and an output BinGrid which is essentially\
            \ a copy of the input, but augmented with the derived P6 parameters filled\
            \ out, and optionally (if a toCrs was given in the request) converted\
            \ global coordinates that are “squared up” in the new geometry (which\
            \ can be used in applications that require a square grid in a project\
            \ CRS geometry; if the “squaring error” is small enough"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertBinGridResponse"
        "400":
          description: Bad input format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Unknown error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: CRS-converter overloaded; try again later
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []

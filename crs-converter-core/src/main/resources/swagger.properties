infoApi.info.description=For deployment available public `/info` endpoint, which provides build and git related information.
healthCheckApi.livenessCheck.summary=Liveness Check endpoint
healthCheckApi.livenessCheck.description=For deployment available public `/liveness_check` endpoint, which provides `CRS Conversion Service is alive` message.
healthCheckApi.readinessCheck.summary=Readiness Check endpoint
healthCheckApi.readinessCheck.description=For deployment available public `/readiness_check` endpoint, which provides `CRS Conversion Service is ready` message.
CrsConverterApi.convertPoint.summary=Convert a list of points
CrsConverterApi.convertPoint.description=Convert a list of points
CrsConverterApi.geo_json_convert.summary=Convert a GeoJSON or AnyCrsGeoJson structure
CrsConverterApi.geo_json_convert.description=Convert a GeoJSON or AnyCrsGeoJson structure to a specified target CRS. GeoJSON is declared - by definition - to be in the context of WGS 84.
CrsConverterApi.convertTrajectory.summary=Convert trajectory stations
CrsConverterApi.convertTrajectory.description=Convert a list of trajectory stations, given the unit and spatial context and a reference point in 3D where MD==0. \n \
                                                + Note: To get WGS 84 output the trajectoryCRS needs to be a BoundCRS (unless it is WGS 84 based)
CrsConverterApi.BinGrid.summary=CRS Convert service is an OSDU platform standard method for QC and conversion of Bin Grids, associated in particular with ingested seismic volumes, that describe the `real world` (Easting, Northing) of bin grid centers at (inline, crossline) local coordinates
CrsConverterApi.BinGrid.description=QC check of the `squareness` of a Bin Grid defined using 4 corner points.\n \
                                    + Coordinate conversion of a Bin Grid to a new CRS and `square it up` (if target CRS is same as original CRS then conversion is omitted, and the squareness test is done in the original CRS).\n \
                                    + Calculate derived P6 parameters from the input 4 corners.\n \
                                    + Calculate WGS 84 coordinates at the corners\n \
                                    + Returns converted Bin Grid and a QC of squareness of the bin grid

CrsConverterApi.convertTrajectoryV4.summary=Convert trajectory stations
CrsConverterApi.convertTrajectoryV4.description=Convert a list of trajectory stations, given the unit and spatial context and a reference point in 3D where MD==0. \
                                    For survey MD, Incl, Azi input, minimum curvature is used to calculate the local deviations and absolute coordinates. \
                                    For MD_dX,dY,dZ, the inverse minimum curvature is first applied to compute Inc and Azi.\n\n \
                                    **Interpolation Feature**: When `interpolate=true` (default), additional stations can be generated at specified measured depths using the `MD_i` parameter:\n \
                                    - Use `MD_i.md_i` for explicit MD values, e.g., [50, 75, 150]\n \
                                    - Use `MD_i.md_interval` for regular spacing, e.g., 25 for every 25 units\n \
                                    - Interpolated stations use minimum curvature interpolation for inc/azi and position\n \
                                    - Response stations include `original: true/false` to distinguish survey vs interpolated\n \
                                    - Set `interpolate=false` to process only original survey stations (MD_i is ignored)\n\n \
                                    ## Request Body Parameters\n\n \
                                    | Parameter | Type | Required | Description |\n \
                                    |-----------|------|----------|-------------|\n \
                                    | **trajectoryCRS** | string | Yes | Coordinate reference system for the reference point. Typically a projected CRS; if geographic CRS, unitXY must be defined and azimuthReference must be TRUE_NORTH. |\n \
                                    | **referencePoint** | Point | Yes | The well surface location (x, y, z) where MD=0. Coordinates are in trajectoryCRS units. |\n \
                                    | **inputStations** | array | Yes | Array of input trajectory stations. Required fields depend on inputKind. |\n \
                                    | **unitZ** | string | Yes | Unit of measure for vertical values (dz) and measured depth. OSDU record ID or persistable reference JSON. |\n \
                                    | **method** | string | Yes | Computation method: 'AzimuthalEquidistant' (default) or 'LMP' (Lee's Modified Proposal SPE96813). |\n \
                                    | **azimuthReference** | string | No | Reference for azimuth angles: TRUE_NORTH (TN) or GRID_NORTH (GN). Default: TRUE_NORTH. |\n \
                                    | **unitXY** | string | No | Unit for horizontal displacements (dx, dy). Required for dX_dY_dZ input kinds. Auto-derived from projected CRS if not specified. |\n \
                                    | **unitMD** | string | No | Unit for Measured Depth values. Defaults to unitZ if not specified. |\n \
                                    | **inputKind** | string | No | Input format: MD_Incl_Azim (default), MD_dX_dY_dZ, dX_dY_dZ, MD_Incl, MD_X_Y_Z, X_Y_Z. |\n \
                                    | **interpolate** | boolean | No | When true (default), interpolates stations at MD_i depths. When false, only original stations processed. |\n \
                                    | **MD_i** | object | No | Interpolation specification: md_i (array of specific depths) or md_interval (regular spacing). |\n\n \
                                    ## Input Station Fields (TrajectoryStationInV4)\n\n \
                                    | Field | Description |\n \
                                    |-------|-------------|\n \
                                    | **md** | Measured Depth - distance along wellbore from reference point. Unit: unitMD or unitZ. |\n \
                                    | **inclination** | Wellbore angle from vertical: 0°=down, 90°=horizontal, 180°=up. |\n \
                                    | **azimuth** | Direction angle: 0°/360°=North, 90°=East, 180°=South, 270°=West. Reference per azimuthReference. |\n \
                                    | **dx** | East-West displacement from reference point. Positive=East. Unit: unitXY. |\n \
                                    | **dy** | North-South displacement from reference point. Positive=North. Unit: unitXY. |\n \
                                    | **dz** | True Vertical Depth from reference point. Positive=deeper. Unit: unitZ. |


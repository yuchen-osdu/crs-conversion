variables:
  SIS_DATA: $CI_PROJECT_DIR/apachesis_setup/SIS_DATA

  AZURE_SERVICE: crs_converter
  AZURE_BUILD_SUBDIR: provider/crs-converter-azure/crs-converter-aks
  AZURE_TEST_SUBDIR: testing/crs_converter_test_azure
  AZURE_TEST_TYPE: python
  ESRI_DATA_PATH: /crs
  SHARE_NAME: crs-conversion

  AWS_BUILD_SUBDIR: provider/crs-converter-aws/build-aws
  AWS_TEST_SUBDIR: testing/crs_converter_test_aws
  AWS_SERVICE: crs-conversion
  AWS_ENVIRONMENT: dev
  AWS_INT_TEST_TYPE: python
  AWS_DEPLOY_TARGET: EKS
  AWS_EKS_DEPLOYMENT_NAME: os-crs-conversion

  IBM_BUILD_SUBDIR: provider/crs-converter-ibm/crs-converter-ocp
  IBM_INT_TEST_PY_SUBDIR: testing/crs_converter_test_ibm
  IBM_INT_TEST_PY_FILE: run_test.py

  OSDU_GCP_SERVICE: crs-converter
  OSDU_GCP_VENDOR: gcp
  OSDU_GCP_INT_TEST_TYPE: python
  OSDU_GCP_PYTHON_INT_TEST_SUBDIR: testing/crs_converter_test_gcp
  OSDU_GCP_HELM_DEPLOYMENT_DIR: "devops/gcp/deploy"
  OSDU_GCP_HELM_CONFIG_DIR: "devops/gcp/configmap"
  OSDU_GCP_HELM_NAMESPACE: default
  OSDU_GCP_HELM_CONFIG_SERVICE: crs-conversion-config
  OSDU_GCP_HELM_DEPLOYMENT_SERVICE: crs-conversion-deploy
  OSDU_GCP_HELM_CONFIG_SERVICE_VARS: "--set data.sis_data=$OSDU_GCP_SIS_DATA --set data.audiences=$GOOGLE_AUDIENCE --set data.partition_api=$OSDU_GCP_PARTITION_API --set data.entitlements_api=$OSDU_GCP_AUTHORIZE_API --set data.log_level=INFO"
  OSDU_GCP_HELM_DEPLOYMENT_SERVICE_VARS: "--set data.image=$CI_REGISTRY_IMAGE/osdu-gcp:$CI_COMMIT_SHORT_SHA --set data.serviceAccountName=crs-conversion-k8s --set conf.app_name=$OSDU_GCP_SERVICE"
  OSDU_GCP_HELM_PACKAGE_CHARTS: "devops/gcp/deploy devops/gcp/configmap"

include:
  - project: "osdu/platform/ci-cd-pipelines"
    file: "standard-setup.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "build/maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/fossa-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/gitlab-ultimate.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/azure.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/ibm-python-test.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/osdu-gcp-gke.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "publishing/pages.yml"

osdu-gcp-test-python:
  variables:
    VIRTUAL_SERVICE_HOST_NAME: $OSDU_GCP_CRS_CONVERTER_HOSTNAME

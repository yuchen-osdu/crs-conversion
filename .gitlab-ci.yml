variables:
  SIS_DATA: $CI_PROJECT_DIR/apachesis_setup/SIS_DATA

  AZURE_SERVICE: crs_converter
  AZURE_BUILD_SUBDIR: provider/crs-converter-azure/crs-converter-aks
  AZURE_TEST_SUBDIR: testing/crs_converter_test_azure
  AZURE_TEST_TYPE: python
  ESRI_DATA_PATH: /crs
  SHARE_NAME: crs-conversion
  AZURE_SWAGGER_PATH: api/crs/converter/swagger-ui/index.html#/

  AWS_BUILD_SUBDIR: provider/crs-converter-aws/build-aws
  AWS_TEST_SUBDIR: testing/crs_converter_test_aws
  AWS_CHART_SUBDIR: devops/aws/chart
  AWS_SERVICE: crs-conversion
  AWS_SERVICE_GATEWAY: osdu-gateway
  AWS_ENVIRONMENT: dev
  AWS_INT_TEST_TYPE: python
  AWS_DEPLOY_TARGET: HELM
  AWS_EKS_DEPLOYMENT_NAME: os-crs-conversion

  IBM_BUILD_SUBDIR: provider/crs-converter-ibm/crs-converter-ocp
  IBM_INT_TEST_PY_SUBDIR: testing/crs_converter_test_ibm
  IBM_INT_TEST_PY_FILE: run_test.py
  IBM_HELM_CONFIG_PATH: devops/ibm/ibm-crs-conversion-config
  IBM_HELM_DEPLOY_PATH: devops/ibm/ibm-crs-conversion-deploy

  # FIXME remove when all services are migrated to a single helm
  OSDU_GCP_ENABLE_HELM_CONFIG: "false"

include:
  - project: "osdu/platform/ci-cd-pipelines"
    file: "standard-setup.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "build/maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/fossa-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "scanners/gitlab-ultimate.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/azure.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-maven.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/aws-python.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/ibm-python-test.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "cloud-providers/osdu-gcp-global.yml"

  - project: "osdu/platform/ci-cd-pipelines"
    file: "publishing/pages.yml"

  - local: "devops/gcp/pipeline/override-stages.yml"

  - local: "devops/aws/pipeline/override-stages.yml"

